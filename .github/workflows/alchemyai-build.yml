name: "AlchemyAI Build"

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.dev
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/alchemyai-automations/postiz-app:latest
            ghcr.io/alchemyai-automations/postiz-app:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_VERSION=main-${{ github.sha }}
          provenance: false
          sbom: false
